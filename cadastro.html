<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Final Destination - Criar Conta</title>

    <!-- Bootstrap CSS -->
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />

    <link rel="stylesheet" href="style.css" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <!-- Navbar -->
    <nav class="navbar navbar-light bg-white shadow-sm fixed-top">
      <div class="container">
        <a class="navbar-brand mx-auto" href="#"> Final Destination </a>
      </div>
    </nav>

    <!-- Conteúdo Principal -->
    <main
      class="container d-flex justify-content-center align-items-center min-vh-100 py-5"
    >
      <div class="row w-100 justify-content-center">
        <div class="col-12 col-md-8 col-lg-5">
          <div class="card card-cadastro p-4 p-md-5">
            <!-- Título -->
            <div class="text-center mb-4">
              <h1 class="fw-bold mb-2">Criar Nova Conta</h1>
              <p class="text-secondary">
                Junte-se a nós e comece sua próxima aventura.
              </p>
            </div>

            <!-- Formulário -->
            <form>
              <div class="mb-3">
                <label class="form-label fw-semibold"> Nome Completo </label>
                <div class="input-group">
                  <span class="input-group-text bg-white">
                    <i class="bi bi-person"></i>
                  </span>
                  <input
                    type="text"
                    class="form-control"
                    placeholder="Seu nome completo"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold"> E-mail </label>
                <div class="input-group">
                  <span class="input-group-text bg-white">
                    <i class="bi bi-envelope"></i>
                  </span>
                  <input
                    type="email"
                    class="form-control"
                    placeholder="seu@email.com"
                  />
                </div>
              </div>

              <div class="mb-3">
                <label class="form-label fw-semibold"> Senha </label>
                <div class="input-group">
                  <span class="input-group-text bg-white">
                    <i class="bi bi-lock"></i>
                  </span>
                  <input
                    type="password"
                    class="form-control"
                    placeholder="••••••••"
                  />
                </div>
              </div>

              <!-- Checkbox -->
              <div class="form-check mb-4">
                <input class="form-check-input" type="checkbox" id="terms" />
                <label class="form-check-label text-secondary" for="terms">
                  Li e concordo com os
                  <a
                    href="#"
                    class="text-danger text-decoration-none fw-semibold"
                  >
                    Termos de Uso
                  </a>
                </label>
              </div>

              <!-- Botão principal -->
              <div class="d-grid mb-4">
                <button type="submit" class="btn btn-primary-custom text-white">
                  Cadastrar
                </button>
              </div>

              <!-- Divisor -->
              <div class="divider mb-4">ou</div>

              <!-- Login Social -->
              <div class="row g-3 mb-4">
                <div class="col-12 col-md-6">
                  <button
                    type="button"
                    class="btn btn-outline-secondary social-btn w-100"
                  >
                    <i class="bi bi-google me-2"></i>
                    Google
                  </button>
                </div>

                <div class="col-12 col-md-6">
                  <button
                    type="button"
                    class="btn btn-outline-secondary social-btn w-100"
                  >
                    <i class="bi bi-apple me-2"></i>
                    Apple
                  </button>
                </div>
              </div>

              <!-- Rodapé -->
              <div class="text-center">
                <p class="text-secondary mb-0">
                  Já tem uma conta?
                  <a
                    href="#"
                    class="text-danger fw-semibold text-decoration-none"
                  >
                    Entre agora
                  </a>
                </p>
              </div>
            </form>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
