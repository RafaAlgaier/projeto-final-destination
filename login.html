<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Final Destination - Login</title>

    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      href="./node_modules/bootstrap/dist/css/bootstrap.min.css"
    />

    <!-- Bootstrap Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />

    <!-- Fonte -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="style.css" />
  </head>

  <body class="d-flex flex-column min-vh-100 bg-light-custom">
    <!-- Navbar -->
    <nav class="navbar navbar-light bg-white shadow-sm fixed-top">
      <div class="container">
        <a class="navbar-brand fw-bold text-danger-custom" href="#">
          <i class="bi bi-airplane-engines-fill me-2"></i>
          Final Destination
        </a>
      </div>
    </nav>

    <!-- Main -->
    <main
      class="flex-grow-1 d-flex align-items-center justify-content-center py-5 mt-5"
    >
      <div class="container">
        <div class="row justify-content-center">
          <div class="col-12 col-md-8 col-lg-5">
            <div class="card border-0 shadow-lg rounded-4 p-4 p-md-5">
              <!-- Título -->
              <div class="mb-4">
                <h1 class="fw-bold mb-2">Bem-vindo de volta</h1>

                <p class="text-secondary">
                  Acesse sua conta para continuar sua jornada.
                </p>
              </div>

              <!-- Form -->
              <form>
                <!-- Email -->
                <div class="mb-3">
                  <label class="form-label fw-semibold">
                    E-mail ou Telefone
                  </label>

                  <input
                    type="text"
                    class="form-control form-control-lg"
                    placeholder="Seu e-mail ou número"
                  />
                </div>

                <!-- Senha -->
                <div class="mb-3">
                  <label class="form-label fw-semibold"> Senha </label>

                  <div class="input-group">
                    <input
                      type="password"
                      class="form-control form-control-lg"
                      placeholder="Sua senha secreta"
                    />

                    <button class="btn btn-outline-secondary" type="button">
                      <i class="bi bi-eye"></i>
                    </button>
                  </div>
                </div>

                <!-- Link -->
                <div class="text-end mb-4">
                  <a
                    href="#"
                    class="text-danger text-decoration-none fw-semibold"
                  >
                    Esqueci minha senha
                  </a>
                </div>

                <!-- Botão -->
                <div class="d-grid mb-4">
                  <button
                    type="submit"
                    class="btn btn-danger btn-lg rounded-4 fw-bold"
                  >
                    Entrar
                  </button>
                </div>
              </form>

              <!-- Divider -->
              <div class="d-flex align-items-center mb-4">
                <hr class="flex-grow-1" />

                <span class="mx-3 text-secondary"> ou </span>

                <hr class="flex-grow-1" />
              </div>

              <!-- Social -->
              <div class="row g-3">
                <div class="col-12">
                  <button
                    class="btn btn-outline-secondary w-100 py-3 rounded-4 fw-semibold"
                  >
                    <i class="bi bi-google me-2"></i>
                    Google
                  </button>
                </div>

                <div class="col-12">
                  <button class="btn btn-dark w-100 py-3 rounded-4 fw-semibold">
                    <i class="bi bi-apple me-2"></i>
                    Apple
                  </button>
                </div>
              </div>

              <!-- Footer -->
              <div class="text-center mt-5">
                <p class="text-secondary mb-0">
                  Não tem uma conta?

                  <a href="#" class="text-danger text-decoration-none fw-bold">
                    Cadastre-se
                  </a>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- Bootstrap JS -->
    <script src="./node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
